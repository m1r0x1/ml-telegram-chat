<!DOCTYPE html>
<html>
<head>
    <title>MiniTelegram ML - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 350px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5a67d8;
        }
        .info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🤖 MiniTelegram ML</h1>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username (alice/bob)" required>
            <input type="password" name="password" placeholder="Password (pass123)" required>
            <button type="submit">Login</button>
        </form>
        <div class="info">
            <strong>Тестовые пользователи:</strong><br>
            alice / pass123<br>
            bob / pass123<br>
            <br>
            💡 Попробуй написать <strong>ml_bot</strong>!
        </div>
    </div>
</body>
</html>
